<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Viewer — Origin Title Wallet</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #141828;
      --surface2: #1c2240;
      --border: #2a3050;
      --text: #e0e4f0;
      --muted: #8890a8;
      --accent: #4a9eff;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --orange: #f97316;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header h1 span { color: var(--accent); }
    header nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 24px;
      font-size: 13px;
    }
    header nav a:hover { color: var(--accent); }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px; }

    .wallet-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .wallet-header h2 { font-size: 22px; margin-bottom: 4px; }
    .wallet-header .owner { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .wallet-header .badges {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.confidence { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.confidence.yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge.confidence.orange { background: rgba(249,115,22,0.15); color: var(--orange); }
    .badge.confidence.red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge.trust { background: rgba(74,158,255,0.15); color: var(--accent); }
    .badge.verified { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.status { background: rgba(74,158,255,0.1); color: var(--muted); }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 10px 20px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    td { color: var(--text); }

    .event {
      padding: 12px 16px;
      border-left: 3px solid var(--accent);
      background: var(--bg);
      border-radius: 0 4px 4px 0;
      margin-bottom: 8px;
    }
    .event .type {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
    }
    .event .desc { font-size: 13px; margin-top: 4px; }
    .event .time { font-size: 10px; color: var(--muted); margin-top: 4px; }

    .json-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .integrity-check {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .integrity-check .icon { font-size: 16px; }
    .integrity-check .label { font-size: 12px; }
    .integrity-check .hash { font-size: 10px; color: var(--muted); font-family: monospace; }

    .party-view {
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .party-view h3 { color: var(--accent); margin-bottom: 12px; }
    .party-view .role-label {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(74,158,255,0.15);
      color: var(--accent);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      margin-bottom: 12px;
    }

    .qr-section {
      text-align: center;
      padding: 20px;
    }
    .qr-placeholder {
      width: 200px;
      height: 200px;
      background: #fff;
      margin: 0 auto 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 12px;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1><span>Origin</span> Title Wallet</h1>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/upload">Upload Closing</a>
    </nav>
  </header>

  <div class="container" id="main">
    <div class="spinner"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const walletId = params.get('id');
    const partyKey = params.get('key');

    function confClass(score) {
      if (score >= 0.85) return 'confidence';
      if (score >= 0.65) return 'confidence yellow';
      if (score >= 0.40) return 'confidence orange';
      return 'confidence red';
    }

    function trustLabel(level) {
      return ['', 'Self-Claimed', 'Deed-Verified', 'Attested', 'Multi-Source', 'Multi-Sig'][level] || `L${level}`;
    }

    function renderJson(obj) {
      return `<div class="json-block">${JSON.stringify(obj, null, 2)}</div>`;
    }

    function renderTable(data, columns) {
      if (!data || !data.length) return '<p style="color:var(--muted);font-size:12px">No records</p>';
      return `<table>
        <tr>${columns.map(c => `<th>${c.label}</th>`).join('')}</tr>
        ${data.map(row => `<tr>${columns.map(c => `<td>${row[c.key] ?? '-'}</td>`).join('')}</tr>`).join('')}
      </table>`;
    }

    async function load() {
      if (!walletId) {
        document.getElementById('main').innerHTML = '<p>No wallet ID specified. Use ?id=PROPERTY-ID</p>';
        return;
      }

      try {
        // Load public wallet data
        const walletResp = await fetch(`/api/wallet/${encodeURIComponent(walletId)}`);
        if (!walletResp.ok) throw new Error('Wallet not found');
        const wallet = await walletResp.json();

        // Load verification
        const verifyResp = await fetch(`/api/wallet/${encodeURIComponent(walletId)}/verify`);
        const verify = verifyResp.ok ? await verifyResp.json() : null;

        // Load party view if key provided
        let partyView = null;
        if (partyKey) {
          const partyResp = await fetch(`/api/wallet/${encodeURIComponent(walletId)}/party?key=${encodeURIComponent(partyKey)}`);
          if (partyResp.ok) partyView = await partyResp.json();
        }

        render(wallet, verify, partyView);
      } catch (err) {
        document.getElementById('main').innerHTML = `<p style="color:var(--red)">Error: ${err.message}</p>`;
      }
    }

    function render(wallet, verify, partyView) {
      const w = wallet.wallet;
      const p = wallet.property;
      const t = wallet.transaction;

      let html = `
        <div class="wallet-header">
          <h2>${p.address}, ${p.town}, ${p.state}</h2>
          <div class="owner">${p.currentOwner} &mdash; ${p.county ? p.county + ' County' : ''}</div>
          <div class="badges">
            <span class="badge ${confClass(w.confidence)}">Confidence: ${(w.confidence || 0).toFixed(2)}</span>
            <span class="badge trust">L${w.trustLevel} ${trustLabel(w.trustLevel)}</span>
            ${verify?.integrityCheck?.publicHashMatch ? '<span class="badge verified">Integrity Verified</span>' : '<span class="badge" style="background:rgba(239,68,68,0.15);color:var(--red)">Integrity Mismatch</span>'}
            <span class="badge status">${w.eventCount} events</span>
            <span class="badge status">Created ${new Date(w.created).toLocaleDateString()}</span>
          </div>
        </div>`;

      // Party view banner
      if (partyView) {
        html += `
          <div class="party-view">
            <span class="role-label">${partyView.role} View</span>
            <p style="font-size:12px;color:var(--muted)">
              You are viewing this wallet as the <strong>${partyView.role}</strong>.
              You have access to ${partyView.accessibleDocuments.length} document types.
            </p>
          </div>`;
      }

      // Tabs
      const tabs = ['Overview', 'Chain of Title', 'Liens', 'Events', 'Verification'];
      if (partyView) tabs.push('Private Documents');

      html += `<div class="tabs">
        ${tabs.map((t, i) => `<div class="tab ${i === 0 ? 'active' : ''}" onclick="switchTab(${i})">${t}</div>`).join('')}
      </div>`;

      // Tab 0: Overview
      html += `<div class="tab-content active" id="tab-0">
        <div class="card">
          <h3>Transaction</h3>
          <table>
            <tr><th>Field</th><th>Value</th></tr>
            <tr><td>Type</td><td>${t.type || '-'}</td></tr>
            <tr><td>Date</td><td>${t.date || '-'}</td></tr>
            <tr><td>Price</td><td>${t.price ? '$' + t.price.toLocaleString() : '-'}</td></tr>
            <tr><td>Deed #</td><td>${t.deedNumber || '-'}</td></tr>
            <tr><td>Book/Page</td><td>${t.bookPage || '-'}</td></tr>
            <tr><td>Registry</td><td>${t.registry || '-'}</td></tr>
          </table>
        </div>
        <div class="card">
          <h3>Parties</h3>
          <table>
            <tr><th>Role</th><th>Name</th><th>Credential</th></tr>
            ${Object.entries(wallet.parties || {}).map(([role, info]) =>
              `<tr>
                <td style="text-transform:capitalize">${role.replace(/([A-Z])/g, ' $1')}</td>
                <td>${info.name || '-'}</td>
                <td style="color:var(--muted)">${info.barNumber || info.licenseNumber || '-'}</td>
              </tr>`
            ).join('')}
          </table>
        </div>
        <div class="card">
          <h3>Deed</h3>
          ${wallet.public?.deed ? renderJson(wallet.public.deed) : '<p style="color:var(--muted)">No deed data</p>'}
        </div>
      </div>`;

      // Tab 1: Chain of Title
      html += `<div class="tab-content" id="tab-1">
        <div class="card">
          <h3>Chain of Title</h3>
          ${wallet.public?.chainOfTitle?.length
            ? renderTable(wallet.public.chainOfTitle, [
                { key: 'owner', label: 'Owner' },
                { key: 'from', label: 'From' },
                { key: 'to', label: 'To' },
                { key: 'deedType', label: 'Type' }
              ])
            : '<p style="color:var(--muted)">No chain of title data</p>'
          }
        </div>
      </div>`;

      // Tab 2: Liens
      html += `<div class="tab-content" id="tab-2">
        <div class="card">
          <h3>Active Liens</h3>
          ${wallet.public?.liens?.active?.length
            ? renderTable(wallet.public.liens.active, [
                { key: 'type', label: 'Type' },
                { key: 'amount', label: 'Amount' },
                { key: 'lender', label: 'Lender' },
                { key: 'date', label: 'Date' },
                { key: 'bookPage', label: 'Book/Page' }
              ])
            : '<p style="color:var(--muted)">No active liens</p>'
          }
        </div>
        <div class="card">
          <h3>Discharged Liens</h3>
          ${wallet.public?.liens?.discharged?.length
            ? renderTable(wallet.public.liens.discharged, [
                { key: 'type', label: 'Type' },
                { key: 'amount', label: 'Amount' },
                { key: 'lender', label: 'Lender' },
                { key: 'dischargeDate', label: 'Discharged' }
              ])
            : '<p style="color:var(--muted)">No discharged liens</p>'
          }
        </div>
      </div>`;

      // Tab 3: Events
      html += `<div class="tab-content" id="tab-3">
        <div class="card">
          <h3>Event History</h3>
          ${(wallet.events || []).map(e => `
            <div class="event">
              <div class="type">${e.type}</div>
              <div class="desc">${e.description}</div>
              <div class="time">${new Date(e.timestamp).toLocaleString()} &mdash; ${e.source || 'system'}</div>
            </div>
          `).join('')}
        </div>
      </div>`;

      // Tab 4: Verification
      html += `<div class="tab-content" id="tab-4">
        <div class="card">
          <h3>Integrity Verification</h3>
          ${verify ? `
            <div class="integrity-check">
              <span class="icon">${verify.integrityCheck.publicHashMatch ? '&#10003;' : '&#10007;'}</span>
              <div>
                <div class="label">Public Layer Hash ${verify.integrityCheck.publicHashMatch ? 'Matches' : 'MISMATCH'}</div>
                <div class="hash">Stored: ${verify.integrityCheck.storedHash?.slice(0, 16)}...</div>
                <div class="hash">Computed: ${verify.integrityCheck.computedHash?.slice(0, 16)}...</div>
              </div>
            </div>
            <table>
              <tr><td>Status</td><td>${verify.status}</td></tr>
              <tr><td>Trust Level</td><td>L${verify.trustLevel} ${trustLabel(verify.trustLevel)}</td></tr>
              <tr><td>Confidence</td><td>${(verify.confidence || 0).toFixed(2)}</td></tr>
              <tr><td>Created</td><td>${new Date(verify.created).toLocaleString()}</td></tr>
              <tr><td>Last Updated</td><td>${new Date(verify.lastUpdated).toLocaleString()}</td></tr>
              <tr><td>Events</td><td>${verify.eventCount}</td></tr>
            </table>
          ` : '<p>Verification data unavailable</p>'}
        </div>
        <div class="card">
          <h3>Document Hashes</h3>
          ${w.documentHashes ? Object.entries(w.documentHashes).map(([doc, hash]) =>
            `<div class="integrity-check">
              <span class="icon">&#128196;</span>
              <div>
                <div class="label" style="text-transform:capitalize">${doc.replace(/([A-Z])/g, ' $1')}</div>
                <div class="hash">${hash}</div>
              </div>
            </div>`
          ).join('') : '<p style="color:var(--muted)">No document hashes</p>'}
        </div>
      </div>`;

      // Tab 5: Private Documents (if party key provided)
      if (partyView) {
        html += `<div class="tab-content" id="tab-5">
          <div class="card">
            <h3>Private Documents — ${partyView.role}</h3>
            <p style="font-size:11px;color:var(--muted);margin-bottom:12px">
              Decrypted with your party key. These documents are encrypted at rest and only visible to you.
            </p>
            ${Object.entries(partyView.documents).map(([docType, doc]) =>
              `<div style="margin-bottom:16px">
                <h4 style="font-size:12px;text-transform:capitalize;margin-bottom:8px;color:var(--accent)">
                  ${docType.replace(/([A-Z])/g, ' $1')}
                </h4>
                ${renderJson(doc)}
              </div>`
            ).join('')}
          </div>
        </div>`;
      }

      document.getElementById('main').innerHTML = html;
    }

    function switchTab(index) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
      document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === index));
    }

    load();
  </script>
</body>
</html>
